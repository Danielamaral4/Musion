name: EAS Android Preview

on:
  workflow_dispatch:

jobs:
  android-preview:
    name: Android preview build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: musion-mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: musion-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate app
        run: npm run validate

      - name: Build Android preview
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx eas-cli@latest build -p android --profile preview --non-interactive --no-wait
