name: Musion QA

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit tests
        run: npm test -- --runInBand

      - name: Build API
        run: npm run build

  mobile:
    name: Mobile app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: musion-mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: musion-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate JSX
        run: npm run validate
